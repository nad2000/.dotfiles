; By default, dwm will render its own top bar over Polybar. You need to apply two patches to the dwm source code:
;   1. ewmhtags patch: This forces dwm to broadcast workspace names and active/occupied states via standard X11 protocols. This allows Polybar to interact with them.
;   2. anybar patch: This tells dwm to hide its built-in bar, accommodate an external status bar, and toggle it correctly.

[colors]
background = #1e1e24
background-alt = #2d2d35
foreground = #a0a0a5
primary = #dfb15b
alert = #cc241d

[module/sep]
type = custom/text
label = "|"
label-foreground = #4a5f4a
; label-foreground = #4a4a4f
; label-padding = 1
label-padding = 0

[bar/dwmbar]
width = 100%
height = 22pt
; offset-x = 1%
; offset-y = 1%
; radius = 8.0  ; Smooth pill-shaped rounded corners

background = ${colors.background}
foreground = ${colors.foreground}

; Height of the underline highlight
line-size = 2pt

; padding-left = 2
padding-left = 0
padding-right = 2
module-margin = 1

# READ THIS: https://github.com/polybar/polybar/wiki/Fonts#debugging-font-issues
# font-0 = "JetBrainsMono Nerd Font:size=10;2"
# font-0 = "DejaVu Sans:size=10;2"
font-0 = "Noto Sans CJK JP:size=11;1"
; Explicit Color Emoji Rendering Fallback
font-1 = "Noto Color Emoji:scale=10;2"
; font-0 = "JetBrains Mono:size=10;2"
; font-0 = "Fixed:size=10;1"
font-2 = "Symbols Nerd Font:size=11;2"
; ADD THIS AS FONT-2: The global script fallback
font-3 = "Noto Sans:size=11;1"
; font-0 = "Victor Mono Nerd Font:size=10:antialias=true:autohint=true;2"
; font-1 = "monospace:size=12;2"
; font-2 = "FontAwesome:pixelsize=30:antialias=true:autohint=true;2"
; font-3 = "Noto Sans CJK JP:size=10;1"
; font-3 = "DejaVu Sans:size=10;1"
; font-4 = "Tamsyn:pixelsize=12;0"
; font-5 = "Roboto:size=11:weight=bold;2"
; font-6 = "Noto Sans:size=11;1"

modules-left = ewmh sep xwindow
;;modules-center = xwindow
modules-right = battery charge sep volume sep ram sep cpu sep wlan sep date sep tray

cursor-click = pointer
cursor-scroll = ns-resize
enable-ipc = true

; IMPORTANT FOR DWM ANYBAR PATCH:
; If using the anybar patch, keep this false so dwm handles the allocation gap.
; Set to false so the dwm-anybar patch manages its window layer
override-redirect = false

[module/ewmh]
type = internal/xworkspaces

; Pin workspaces prevents clutter across multi-monitor setups
pin-workspaces = true

; enable-click = true
; enable-scroll = true
enable-click = false
enable-scroll = false

; Map mouse clicks to standard dwm keystrokes (Mod4 + Workspace Number) via xdotool
; If you use Alt instead of Super/Windows key, change 'super' to 'alt'
; click-left = xdotool key super+%name%
; click-left = xdotool key alt+%name%
click-left = xdotool key alt+%index%

; Format structure
; format = <label-state>

; WRAP THE ENTIRE STATE LIST IN WHEEL UP (A4) AND WHEEL DOWN (A5) ACTIONS
; --relative -- +1 moves to the next workspace; -1 moves to the previous workspace
;; format = %{A4:xdotool set_desktop --relative -- +1 &:}%{A5:xdotool set_desktop --relative -- -1 &:}<label-state>%{A}%{A}
; Point A4 (Scroll Up) and A5 (Scroll Down) directly to your logic script
format = %{A4:~/.dotfiles/bin/cycle_tags.sh next &:}%{A5:~/.dotfiles/bin/cycle_tags.sh prev &:}<label-state>%{A}%{A}

; Style for the Active Tag (e.g., Tag 5 with the gold background/underline)
label-active = %name%
; label-active-font = 3
label-active-background = ${colors.background-alt}
label-active-underline = ${colors.primary}
label-active-padding = 2
label-active-foreground = #ffffff

; Style for tags with open windows (Occupied)
; label-occupied = %name%
label-occupied = %{A1:xdotool key alt+%index% &:}%name%%{A}
label-occupied-foreground = #ffffff
label-occupied-padding = 2

; Style for empty/inactive tags (dimmed out)
; label-empty = %name%
label-empty = %{A1:xdotool key alt+%index% &:}%name%%{A}
label-empty-foreground = #4a4a4f
label-empty-padding = 2

[module/tray]
type = internal/tray
tray-spacing = 8px
tray-size = 60%

[module/cpu]
type = internal/cpu
interval = 3
format = <label>
label = %percentage%%
label-foreground = #ffffff
; format-prefix = "CPU "
format-prefix = "⚙️ "
format-prefix-foreground = ${colors.primary}

[module/eth]
type = internal/network
interface-type = wired
label-connected = eno1 %local_ip%
label-connected-foreground = #ffffff
format-connected-prefix = "eno1 "
format-connected-prefix-foreground = ${colors.primary}

[module/wlan]
type = internal/network
; Replace 'wlan0' with your exact interface name from the terminal command
interface = wlan0
interval = 3.0

; Style when connected to your Wi-Fi network
format-connected = <label-connected>
label-connected = %essid% %local_ip%
label-connected-foreground = #ffffff
format-connected-prefix = "🛜 "
format-connected-prefix-foreground = ${colors.primary}

; Style when disconnected or airplane mode is active
format-disconnected = <label-disconnected>
; label-disconnected = WIFI down
label-disconnected = ⚠️
label-disconnected-foreground = ${colors.alert}

[module/memory]
type = internal/memory
# interval = 2
interval = 3
format-prefix = "RAM "
label = %percentage_used%%

[module/ram]
type = internal/memory
interval = 3
format = <label>
; label = RAM %percentage%%
label = %percentage_used%%
label-foreground = #ffffff
# format-prefix = "RAM "
format-prefix = "🧠 "
format-prefix-foreground = ${colors.primary}

[module/date]
type = internal/date
# interval = 1
interval = 60
# date = %Y-%m-%d %H:%M:%S
date = %a, %b %d %H:%M
label = %date%
label-foreground = ${colors.primary}

[module/volume]
type = internal/pulseaudio
format-volume = <label-volume>
label-volume = %percentage%%
label-volume-foreground = #ffffff
format-volume-prefix = "🔊 "
; animation-volume-0 = 󰖁
; animation-volume-1 = 󰕾
; animation-volume-2 = 󰖀
format-volume-prefix-foreground = ${colors.primary}

format-muted = <label-muted>
label-muted = 🔇
label-muted-foreground = ${colors.alert}

; NB! Check ls -1 /sys/class/power_supply/
[module/battery]
type = internal/battery
full-at = 98
low-at = 5
; battery = BAT0
battery = BAT1
; adapter = AC
adapter = ADP1
poll-interval = 5

; label-charging = %percentage%
; label-discharging = %percentage%
;
animation-charging-0 = 󰢟
animation-charging-1 = 󰂆
animation-charging-2 = 󰂈
animation-charging-3 = 󰂉
animation-charging-4 = 󰂄
animation-charging-framerate = 1000

ramp-capacity-0 = 󰂎
ramp-capacity-1 = 󰁺
ramp-capacity-2 = 󰁼
ramp-capacity-3 = 󰁾
ramp-capacity-4 = 󰁹

; Charging
; format-charging = <label-charging>
; ; Tells Polybar to look inside the secondary font layout (T2) for the icons
format-charging = %{T2}<animation-charging>%{T-} <label-charging>
format-charging-underline = #a3be8c
label-charging = %percentage%%
label-charging-foreground = #ffffff
;format-charging-prefix = "BAT "
format-charging-prefix-foreground = ${colors.primary}

; Discharging
; format-discharging = <ramp-capacity> <label-discharging>
; format-discharging = <label-discharging>
format-discharging = %{T2}<ramp-capacity>%{T-} <label-discharging>
format-discharging-underline = #bf616a
label-discharging = %percentage%%
label-discharging-foreground = #ffffff
;format-discharging-prefix = "BAT "
format-discharging-prefix-foreground = ${colors.primary}

; Full
format-full = <ramp-capacity> <label-full>
format-full-underline = #a3be8c

[module/charge]
type = internal/battery
; battery = BAT0
battery = BAT1
; adapter = AC
adapter = ADP1
poll-interval = 5
format-charging = "⚡"
format-charging-foreground = ${colors.primary}
format-discharging = ""
format-full = ""

[module/xwindow]
type = internal/xwindow
; Truncate titles longer than 40 characters so they don't break the bar layout
; label = %title:0:40:...%
label = %title:0:60:...%
label-foreground = #afafaf
; label-foreground = #ffffff
label-empty = "Desktop"
label-empty-foreground = #4a4a4f
label-padding = 2
label-empty-padding = 2

[bar/mybar]
# Basic sizing and placement
width = 100%
; height = 24
height = 26px
bottom = false

background = ${colors.background}
foreground = ${colors.foreground}

# Font setting
font-0 = "DejaVu Sans:size=10;2"

# THIS WAS MISSING: Telling Polybar which modules to load and where
modules-right = cpu memory date tray
